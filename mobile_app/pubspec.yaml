name: OrderzHouse
description: "OrderzHouse Mobile App - Marketplace for Clients and Freelancers"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  flutter_staggered_grid_view: ^0.7.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^13.2.2

  # Networking
  dio: ^5.4.0
  json_annotation: ^4.8.1

  # Models
  freezed_annotation: ^2.4.1
  json_serializable: ^6.7.1

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Local DB cache (run build_runner to generate app_database.g.dart when adding Drift)
  path_provider: ^2.1.1

  # Environment
  flutter_dotenv: ^5.1.0

  # Google Sign-In
  google_sign_in: ^6.2.2

  # Localization
  intl: 0.20.2

  # Responsive UI
  flutter_screenutil: ^5.9.3

  # Utilities
  image_picker: ^1.0.7
  file_picker: ^8.1.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.2
  webview_flutter: ^4.4.2
  shimmer: ^3.0.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/icon.png
    - assets/policies/
flutter_icons:
  android: true
  ios: true
  image_path_android: assets/icon.png
  image_path_ios: assets/icon.png
  remove_alpha_ios: true
  # خلفية أيقونة Android (برتقالي فاتح) بدلاً من الأبيض
  adaptive_icon_background: "#FFE0B2"
  adaptive_icon_foreground: assets/icon.png

  


