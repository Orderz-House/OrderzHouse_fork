name: mobile_app
description: "OrderzHouse Mobile App - Marketplace for Clients and Freelancers"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1

  # State Management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^13.2.2

  # Networking
  dio: ^5.4.0
  json_annotation: ^4.8.1

  # Models
  freezed_annotation: ^2.4.1
  json_serializable: ^6.7.1

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Environment
  flutter_dotenv: ^5.1.0

  # Localization
  intl: 0.20.2

  # Utilities
  equatable: ^2.0.5
  image_picker: ^1.0.7
  file_picker: ^8.1.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.8
  freezed: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - .env